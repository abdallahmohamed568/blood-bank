<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الرسائل - قطرة حياة</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩸</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="animations.css">
  <link rel="stylesheet" href="components.css">
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">🩸</div>
        <div class="logo-text"><span class="name">قطرة حياة</span><span class="tagline">الرسائل الداخلية</span></div>
      </a>
      <div class="header-actions">
        <button class="btn-icon theme-toggle">🌙</button>
        <button class="lang-toggle">EN</button>
        <a href="dashboard-user.html" class="btn btn-outline btn-sm">← العودة</a>
        <button class="btn btn-outline btn-sm btn-logout">خروج</button>
      </div>
    </div>
  </div>
</header>

<div class="page-content" style="display:flex;flex-direction:column;height:100vh;">
  <div class="container" style="flex:1;padding-top:20px;padding-bottom:20px;display:flex;flex-direction:column;max-width:900px;">

    <div class="alert alert-info mb-16" style="flex-shrink:0;">
      <span>🛡️</span>
      <span data-i18n="chat.admin.note">تخضع جميع المحادثات لرقابة الإدارة لضمان بيئة آمنة</span>
    </div>

    <div style="flex:1;background:var(--bg-card);border-radius:var(--radius-xl);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;">
      <!-- Header -->
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg-secondary);">
        <div class="chat-avatar">🛡️</div>
        <div>
          <div style="font-weight:700;">فريق الإدارة - قطرة حياة</div>
          <div style="font-size:0.78rem;color:var(--success);">● متاح دائماً للمساعدة</div>
        </div>
        <div style="margin-right:auto;font-size:0.8rem;color:var(--text-muted);">
          📧 dropoflife132@gmail.com
        </div>
      </div>

      <!-- Messages -->
      <div id="chat-messages" class="chat-messages" style="flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;">
        <div style="text-align:center;background:var(--bg-secondary);border-radius:var(--radius);padding:14px;font-size:0.85rem;color:var(--text-muted);max-width:80%;margin:0 auto;">
          🌟 مرحباً بك في نظام المراسلة الداخلية لقطرة حياة. يمكنك التواصل مع فريق الإدارة مباشرة هنا.
        </div>
      </div>

      <!-- Typing indicator -->
      <div id="typing-indicator" style="display:none;padding:0 24px 8px;">
        <div style="display:inline-flex;align-items:center;gap:6px;background:var(--bg-secondary);padding:8px 14px;border-radius:18px;">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <span style="font-size:0.78rem;color:var(--text-muted);">الإدارة تكتب...</span>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area" style="border-top:1px solid var(--border);">
        <input type="text" id="chat-input" class="chat-input" placeholder="اكتب رسالتك للإدارة..." data-i18n-placeholder="chat.placeholder">
        <button class="btn-icon" onclick="attachFile()" title="إرفاق ملف">📎</button>
        <button class="btn btn-primary" id="btn-chat-send" onclick="sendUserMessage()">
          إرسال ➤
        </button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="sheets.js"></script>
<script src="chat.js"></script>
<script>
function sendUserMessage() {
  const input = document.getElementById('chat-input');
  const user = App.user;
  if (!input.value.trim() || !user) return;

  const chatId = ChatSystem.getChatId(user.id, 'ADMIN001');
  ChatSystem.sendMessage(user.id, user.fullname || user.hospital_name || 'مستخدم', 'ADMIN001', 'الإدارة', input.value.trim());
  input.value = '';
  renderMessages();

  // Simulate typing response
  setTimeout(() => {
    document.getElementById('typing-indicator').style.display = '';
    setTimeout(() => {
      document.getElementById('typing-indicator').style.display = 'none';
      ChatSystem.sendMessage('ADMIN001', 'الإدارة', user.id, user.fullname || 'مستخدم', 'شكراً على تواصلك. سيرد عليك أحد أعضاء الفريق في أقرب وقت ممكن. 🙏');
      renderMessages();
    }, 2000);
  }, 500);
}

function renderMessages() {
  const user = App.user;
  if (!user) return;
  const chatId = ChatSystem.getChatId(user.id, 'ADMIN001');
  const msgs = ChatSystem.messages.filter(m => m.chatId === chatId);
  const el = document.getElementById('chat-messages');

  const initMsg = `<div style="text-align:center;background:var(--bg-secondary);border-radius:var(--radius);padding:14px;font-size:0.85rem;color:var(--text-muted);max-width:80%;margin:0 auto;">
    🌟 مرحباً بك في نظام المراسلة الداخلية لقطرة حياة. يمكنك التواصل مع فريق الإدارة مباشرة هنا.
  </div>`;

  el.innerHTML = initMsg + msgs.map(m => {
    const isMine = m.senderId === user.id;
    const time = new Date(m.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    return `
      <div style="display:flex;flex-direction:column;align-items:${isMine ? 'flex-end' : 'flex-start'};">
        <div class="msg-bubble ${isMine ? 'sent' : 'received'} ${m.flagged ? 'chat-flagged' : ''}">
          ${m.flagged ? '<div style="font-size:0.72rem;opacity:0.7;margin-bottom:4px;">⚠️ هذه الرسالة تحت المراجعة</div>' : ''}
          ${m.text}
          <div class="msg-time">${time}</div>
        </div>
      </div>`;
  }).join('');

  el.scrollTop = el.scrollHeight;
}

document.getElementById('chat-input')?.addEventListener('keypress', e => {
  if (e.key === 'Enter') sendUserMessage();
});

function attachFile() {
  App.showToast('رفع الملفات قادم قريباً 🔜', 'info');
}

document.addEventListener('DOMContentLoaded', () => {
  if (!App.user) { window.location.href = 'login.html'; return; }
  ChatSystem.init();
  renderMessages();
});
</script>
</body>
</html>
